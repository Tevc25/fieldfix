<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1565C0" />
    <meta
      name="description"
      content="Aplikacija PrijaviMesto ni dostopna brez internetne povezave."
    />
    <title>Brez povezave — PrijaviMesto</title>
    <style>
      :root {
        --color-primary: #1565c0;
        --color-bg: #ffffff;
        --color-text: #212121;
        --color-text-secondary: #424242;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-primary: #64b5f6;
          --color-bg: #121212;
          --color-text: #e0e0e0;
          --color-text-secondary: #bdbdbd;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--color-bg);
        color: var(--color-text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1.5rem;
        text-align: center;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        line-height: 1;
      }
      h1 {
        font-size: clamp(1.5rem, 5vw, 2rem);
        color: var(--color-primary);
        margin-bottom: 0.75rem;
      }
      p {
        color: var(--color-text-secondary);
        max-width: 36ch;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: var(--color-primary);
        color: #fff;
        border-radius: 0.375rem;
        text-decoration: none;
        font-weight: 600;
      }
      a:focus-visible {
        outline: 3px solid var(--color-primary);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div class="icon" aria-hidden="true">📡</div>
    <h1>Brez internetne povezave</h1>
    <p>
      Stran ni na voljo brez povezave. Vaše oddane prijave so shranjene in bodo samodejno poslane,
      ko se spet povežete.
    </p>
    <a href="/">
      <span aria-hidden="true">←</span>
      Nazaj na začetek
    </a>
  </body>
</html>
