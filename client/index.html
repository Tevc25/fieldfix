<!DOCTYPE html>
<html lang="sl" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1565C0" />
    <meta name="description" content="Prijavite komunalne težave v vašem mestu — jame, pokvarjene svetilke, grafite in več." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PrijaviMesto" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Leaflet CSS — self-hosted via npm, served by Vite -->
    <link rel="stylesheet" href="/node_modules/leaflet/dist/leaflet.css" />

    <title>PrijaviMesto</title>

    <style>
      /* Critical path CSS — prevents FOUC */
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
      body { margin: 0; min-height: 100dvh; font-family: system-ui, -apple-system, sans-serif; }
    </style>
  </head>

  <body>
    <!-- Skip navigation link (WCAG 2.4.1) -->
    <a href="#main" class="skip-link">Skoči na glavno vsebino</a>

    <!-- App shell — header + nav -->
    <header class="app-header" role="banner">
      <div class="app-header__inner">
        <a href="/" class="app-logo" aria-label="PrijaviMesto — začetna stran">
          <span class="app-logo__icon" aria-hidden="true">📍</span>
          <span class="app-logo__name">PrijaviMesto</span>
        </a>

        <button
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="main-nav"
          aria-label="Odpri navigacijo"
          hidden
        >
          <span aria-hidden="true">☰</span>
        </button>

        <nav id="main-nav" aria-label="Glavna navigacija">
          <ul class="nav-list" role="list">
            <li><a href="/" class="nav-link" data-nav="home">Prijave</a></li>
            <li><a href="/prijavi" class="nav-link" data-nav="new">Nova prijava</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main content (router target) -->
    <main id="main" tabindex="-1">
      <!-- Hydrated by router -->
      <div class="loading-shell" aria-busy="true" aria-label="Nalaganje…">
        <div class="loading-spinner" aria-hidden="true"></div>
      </div>
    </main>

    <footer class="app-footer" role="contentinfo">
      <p>
        PrijaviMesto &copy; 2026 &mdash;
        <a href="/o-aplikaciji">O aplikaciji</a>
      </p>
    </footer>

    <!-- Accessible live region for screen reader announcements (polite) -->
    <div
      id="announcer"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      class="sr-only"
    ></div>

    <!-- Toast notifications (assertive — errors and confirmations) -->
    <div id="toast-container" aria-label="Obvestila" aria-relevant="additions"></div>

    <!-- SW update banner (Phase 4 will activate this) -->
    <div id="sw-update-banner" hidden role="alert">
      <p>Nova različica je na voljo.</p>
      <button id="sw-update-btn">Osveži</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
